# [TEST SAMPLE] Insecure Nginx Configuration - FOR SECURITY TESTING ONLY
server {
    listen 80;
    server_name _;

    # Directory listing enabled (information disclosure)
    autoindex on;

    # Server version exposed
    server_tokens on;

    location / {
        root /;
        # Allows access to entire filesystem
    }

    location /server-status {
        # Status page exposed without auth
        stub_status on;
        allow all;
    }

    location ~ /\.git {
        # Git directory exposed
    }

    location /admin {
        # No authentication required
        proxy_pass http://localhost:8080;
    }
}
